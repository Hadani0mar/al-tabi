name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract changelog for this version
        id: changelog
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v', ''
          $content = Get-Content CHANGELOG.md -Raw
          # استخراج قسم الإصدار الحالي
          $pattern = "## \[$tag\].*?(?=\n## \[|\z)"
          if ($content -match "(?s)$pattern") {
            $notes = $matches[0].Trim()
          } else {
            $notes = "الإصدار $tag"
          }
          # حفظ في ملف مؤقت لتفادي مشاكل الأحرف الخاصة
          $notes | Out-File -FilePath release_notes.txt -Encoding utf8
          echo "RELEASE_NOTES_FILE=release_notes.txt" >> $env:GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: reports-app/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./reports-app/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: reports-app
        run: npm ci

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: reports-app
          tagName: ${{ github.ref_name }}
          releaseName: "نظام المتمكن ${{ github.ref_name }}"
          releaseBody: "${{ env.RELEASE_NOTES }}"
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

      - name: Update release notes from file
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $notes = Get-Content release_notes.txt -Raw
          $tag = "${{ github.ref_name }}"
          gh release edit $tag --notes $notes
