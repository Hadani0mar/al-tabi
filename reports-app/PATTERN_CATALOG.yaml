# كatalog الأنماط المنطقي — مرجع للمطورين
# التنفيذ: pattern_catalog.rs | SQL: AGENT_Marketing2026.md / AGENT_InfinityRetailDB.md
#
# pattern_id     — معرف ثابت (يُمرَّر لـ run_query_pattern)
# name_ar        — الاسم العربي للمستخدم
# section        — يطابق ## PATTERN: {section} في ملف AGENT_*.md
# marketing      — متاح على Marketing2026
# infinity       — متاح على InfinityRetailDB
# triggers       — كلمات مفتاحية (للمطور / fallback)
# product_filter — يحتاج product_filter

patterns:
  - id: product_count
    name_ar: عدد المنتجات
    section: عدد-المنتجات
    marketing: true
    infinity: true
    triggers: [عدد المنتجات, كم منتج, count products]

  - id: top_sellers
    name_ar: أعلى منتجات مبيعاً (30 يوم)
