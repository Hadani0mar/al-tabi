<!doctype html>
<html lang="ar" dir="rtl"><head>
<meta charset="utf-8">
<title>Colors — Brand</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>body { padding: 18px 22px; } .row { gap:14px;} </style></head>
<body>
<div class="row">
  
  <div class="swatch">
    <div class="swatch__chip" style="background: var(--brand-primary)"></div>
    <div class="swatch__name">Primary</div>
    <div class="swatch__hex">#0F6E70</div>
  </div>
  
  <div class="swatch">
    <div class="swatch__chip" style="background: var(--brand-primary-hover)"></div>
    <div class="swatch__name">Primary Hover</div>
    <div class="swatch__hex">#0A5759</div>
  </div>
  
  <div class="swatch">
    <div class="swatch__chip" style="background: var(--brand-primary-soft)"></div>
    <div class="swatch__name">Primary Soft</div>
    <div class="swatch__hex">#E2F1F1</div>
  </div>
  
  <div class="swatch">
    <div class="swatch__chip" style="background: var(--brand-accent)"></div>
    <div class="swatch__name">Accent</div>
    <div class="swatch__hex">#B86A2C</div>
  </div>
  
  <div class="swatch">
    <div class="swatch__chip" style="background: var(--brand-accent-hover)"></div>
    <div class="swatch__name">Accent Hover</div>
    <div class="swatch__hex">#99571F</div>
  </div>
  
  <div class="swatch">
    <div class="swatch__chip" style="background: var(--brand-accent-soft)"></div>
    <div class="swatch__name">Accent Soft</div>
    <div class="swatch__hex">#FAEEDF</div>
  </div>
  
  <div class="swatch">
    <div class="swatch__chip" style="background: var(--ai-glow)"></div>
    <div class="swatch__name">AI Glow</div>
    <div class="swatch__hex">#D8854B</div>
  </div>
</div></body></html>
