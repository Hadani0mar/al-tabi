<!doctype html>
<html lang="ar" dir="rtl"><head>
<meta charset="utf-8">
<title>Colors — Ink (Text)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>body{padding:18px 22px;} .row{gap:14px;} .swatch__chip{ border:1px solid var(--border-subtle);}</style></head>
<body>
<div class="row">
  
  <div class="swatch">
    <div class="swatch__chip" style="background: var(--fg-1)"></div>
    <div class="swatch__name">Ink 1</div>
    <div class="swatch__hex">#0E1729</div>
  </div>
  
  <div class="swatch">
    <div class="swatch__chip" style="background: var(--fg-2)"></div>
    <div class="swatch__name">Ink 2</div>
    <div class="swatch__hex">#3D4858</div>
  </div>
  
  <div class="swatch">
    <div class="swatch__chip" style="background: var(--fg-3)"></div>
    <div class="swatch__name">Ink 3</div>
    <div class="swatch__hex">#6E7787</div>
  </div>
  
  <div class="swatch">
    <div class="swatch__chip" style="background: var(--fg-muted)"></div>
    <div class="swatch__name">Muted</div>
    <div class="swatch__hex">#9CA3AF</div>
  </div>
  
  <div class="swatch">
    <div class="swatch__chip" style="background: var(--fg-on-brand)"></div>
    <div class="swatch__name">On Brand</div>
    <div class="swatch__hex">#FBF8F0</div>
  </div>
  
  <div class="swatch">
    <div class="swatch__chip" style="background: var(--border-default)"></div>
    <div class="swatch__name">Border</div>
    <div class="swatch__hex">#D1C5A8</div>
  </div>
</div></body></html>
