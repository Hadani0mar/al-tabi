<!doctype html>
<html lang="ar" dir="rtl"><head>
<meta charset="utf-8">
<title>Colors — Semantic</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>body{padding:18px 22px;} .grp{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;} .pair{display:flex;flex-direction:column;gap:6px;} .pair .swatch{flex:1;} .pair .swatch__chip{height:48px;}</style></head>
<body>
<div class="grp">
  <div class="pair">
    
  <div class="swatch">
    <div class="swatch__chip" style="background: var(--success)"></div>
    <div class="swatch__name">Success</div>
    <div class="swatch__hex">#3F7D58</div>
  </div>
    
  <div class="swatch">
    <div class="swatch__chip" style="background: var(--success-soft)"></div>
    <div class="swatch__name">Success Soft</div>
    <div class="swatch__hex">#E6EFE7</div>
  </div>
  </div>
  <div class="pair">
    
  <div class="swatch">
    <div class="swatch__chip" style="background: var(--warning)"></div>
    <div class="swatch__name">Warning</div>
    <div class="swatch__hex">#B47312</div>
  </div>
    
  <div class="swatch">
    <div class="swatch__chip" style="background: var(--warning-soft)"></div>
    <div class="swatch__name">Warning Soft</div>
    <div class="swatch__hex">#F8EBCB</div>
  </div>
  </div>
  <div class="pair">
    
  <div class="swatch">
    <div class="swatch__chip" style="background: var(--danger)"></div>
    <div class="swatch__name">Danger</div>
    <div class="swatch__hex">#B33A2A</div>
  </div>
    
  <div class="swatch">
    <div class="swatch__chip" style="background: var(--danger-soft)"></div>
    <div class="swatch__name">Danger Soft</div>
    <div class="swatch__hex">#F5E0DC</div>
  </div>
  </div>
  <div class="pair">
    
  <div class="swatch">
    <div class="swatch__chip" style="background: var(--info)"></div>
    <div class="swatch__name">Info</div>
    <div class="swatch__hex">#2A5E8C</div>
  </div>
    
  <div class="swatch">
    <div class="swatch__chip" style="background: var(--info-soft)"></div>
    <div class="swatch__name">Info Soft</div>
    <div class="swatch__hex">#E1ECF5</div>
  </div>
  </div>
</div></body></html>
