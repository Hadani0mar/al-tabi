<!doctype html>
<html lang="ar" dir="rtl"><head>
<meta charset="utf-8">
<title>Colors — Surfaces (Light)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>body{padding:18px 22px;background:#FFFFFF;} .row{gap:14px;}</style></head>
<body>
<div class="row">
  
  <div class="swatch">
    <div class="swatch__chip" style="background: var(--bg-canvas)"></div>
    <div class="swatch__name">Canvas</div>
    <div class="swatch__hex">#F6F2E8</div>
  </div>
  
  <div class="swatch">
    <div class="swatch__chip" style="background: var(--bg-surface)"></div>
    <div class="swatch__name">Surface</div>
    <div class="swatch__hex">#FBF8F0</div>
  </div>
  
  <div class="swatch">
    <div class="swatch__chip" style="background: var(--bg-elevated)"></div>
    <div class="swatch__name">Elevated</div>
    <div class="swatch__hex">#FFFFFF</div>
  </div>
  
  <div class="swatch">
    <div class="swatch__chip" style="background: var(--bg-subtle)"></div>
    <div class="swatch__name">Subtle</div>
    <div class="swatch__hex">#EDE6D4</div>
  </div>
  
  <div class="swatch">
    <div class="swatch__chip" style="background: var(--bg-muted)"></div>
    <div class="swatch__name">Muted</div>
    <div class="swatch__hex">#E2D9C2</div>
  </div>
  
  <div class="swatch">
    <div class="swatch__chip" style="background: var(--bg-inverse)"></div>
    <div class="swatch__name">Inverse</div>
    <div class="swatch__hex">#0E1729</div>
  </div>
</div></body></html>
