<!doctype html>
<html lang="ar" dir="rtl"><head>
<meta charset="utf-8">
<title>Components — Schedule Cards</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body{padding:16px 22px;}
  .row{display:grid; grid-template-columns: 1fr 1fr; gap:14px;}
  .sch{
    display:grid; grid-template-columns: auto 1fr auto; gap:12px; align-items:center;
    padding: 12px 14px; background: var(--bg-elevated); border:1px solid var(--border-subtle); border-radius: var(--radius-lg); box-shadow: var(--shadow-xs);
  }
  .ic{ width:36px; height:36px; border-radius:8px; display:flex; align-items:center; justify-content:center; background: var(--brand-primary-soft); color: var(--brand-primary-ink);}
  .ic svg{ width:18px; height:18px; }
  .ic--accent{ background: var(--brand-accent-soft); color: var(--brand-accent-ink);}
  .name{font-size:13.5px; font-weight:600;}
  .meta{font-size:11.5px; color: var(--fg-3); display:flex; gap:8px; align-items:center; margin-top:2px;}
  .toggle{
    width:38px; height:22px; border-radius:99px; background: var(--brand-primary); position:relative; cursor:pointer;
  }
  .toggle::after{ content:''; position:absolute; top:2px; inset-inline-end:2px; width:18px; height:18px; border-radius:50%; background:#fff; box-shadow: var(--shadow-xs);}
  .toggle.off{ background: var(--bg-muted);}
  .toggle.off::after{ inset-inline-end: auto; inset-inline-start: 2px;}
  .pill-mini{ display:inline-flex; gap:5px; align-items:center; font-size:11px; padding:1px 8px; border-radius:99px; background: var(--success-soft); color: var(--success-fg); font-weight:600;}
  .pill-mini .dot{ width:5px; height:5px; border-radius:50%; background: var(--success);}
</style></head>
<body>
<div class="row">
  <div class="sch">
    <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></div>
    <div>
      <div class="name">تقرير المبيعات اليومي</div>
      <div class="meta"><span class="pill-mini"><span class="dot"></span>يومي 08:00</span><span>· Telegram</span></div>
    </div>
    <div class="toggle"></div>
  </div>
  <div class="sch">
    <div class="ic ic--accent"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg></div>
    <div>
      <div class="name">تنبيه الأصناف قاربت على النفاد</div>
      <div class="meta"><span class="pill-mini" style="background: var(--bg-muted); color: var(--fg-2);"><span class="dot" style="background:var(--fg-muted)"></span>متوقّف</span><span>· أسبوعي</span></div>
    </div>
    <div class="toggle off"></div>
  </div>
</div></body></html>
