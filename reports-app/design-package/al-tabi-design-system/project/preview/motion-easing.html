<!doctype html>
<html lang="ar" dir="rtl"><head>
<meta charset="utf-8">
<title>Motion — Easing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body{padding:18px 24px;}
  .row{display:flex; gap:22px; flex-wrap:wrap;}
  .m{flex:1; min-width:160px;}
  .m b{font-size:11px; font-family:var(--font-mono); color:var(--fg-3); display:block; margin-bottom:6px;}
  .m .desc{font-size:12px; color:var(--fg-2); margin-top:4px;}
  .track{height:8px; background:var(--bg-subtle); border-radius:99px; overflow:hidden; position:relative;}
  .dot{position:absolute; top:-3px; width:14px; height:14px; border-radius:50%; background:var(--brand-primary); box-shadow: 0 0 0 3px var(--brand-primary-soft);}
  .a1 .dot{ animation: slide 2.2s var(--ease-out) infinite alternate; }
  .a2 .dot{ animation: slide 2.2s var(--ease-in-out) infinite alternate; background: var(--brand-accent); box-shadow: 0 0 0 3px var(--brand-accent-soft); }
  .a3 .dot{ animation: slide 2.2s var(--ease-soft) infinite alternate; background: var(--success); box-shadow: 0 0 0 3px var(--success-soft); }
  @keyframes slide { from { inset-inline-start: 0; } to { inset-inline-start: calc(100% - 14px); } }
</style></head>
<body>
<div class="row">
  <div class="m a1">
    <b>ease-out · 200ms</b>
    <div class="track"><div class="dot"></div></div>
    <div class="desc">الافتراضي للظهور والاختفاء</div>
  </div>
  <div class="m a2">
    <b>ease-in-out · 320ms</b>
    <div class="track"><div class="dot"></div></div>
    <div class="desc">انتقالات الواجهة</div>
  </div>
  <div class="m a3">
    <b>ease-soft · 120ms</b>
    <div class="track"><div class="dot"></div></div>
    <div class="desc">hover, focus سريع</div>
  </div>
</div></body></html>
