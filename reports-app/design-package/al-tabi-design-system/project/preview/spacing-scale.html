<!doctype html>
<html lang="ar" dir="rtl"><head>
<meta charset="utf-8">
<title>Spacing — Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body{padding:18px 24px;}
  .row{display:flex; align-items:flex-end; gap:18px;}
  .item{display:flex; flex-direction:column; align-items:center; gap:8px; font-family:var(--font-mono); font-size:11px; color:var(--fg-3);}
  .item b{font-family:var(--font-ui); color:var(--fg-1); font-size:12px;}
  .box{background:var(--brand-primary-soft); border:1px solid var(--brand-primary); border-radius:4px;}
</style></head>
<body>
<div class="row">
  <div class="item"><div class="box" style="width:4px;height:4px;"></div><b>1</b><span>4px</span></div>
  <div class="item"><div class="box" style="width:8px;height:8px;"></div><b>2</b><span>8</span></div>
  <div class="item"><div class="box" style="width:12px;height:12px;"></div><b>3</b><span>12</span></div>
  <div class="item"><div class="box" style="width:16px;height:16px;"></div><b>4</b><span>16</span></div>
  <div class="item"><div class="box" style="width:20px;height:20px;"></div><b>5</b><span>20</span></div>
  <div class="item"><div class="box" style="width:24px;height:24px;"></div><b>6</b><span>24</span></div>
  <div class="item"><div class="box" style="width:32px;height:32px;"></div><b>7</b><span>32</span></div>
  <div class="item"><div class="box" style="width:40px;height:40px;"></div><b>8</b><span>40</span></div>
  <div class="item"><div class="box" style="width:48px;height:48px;"></div><b>9</b><span>48</span></div>
  <div class="item"><div class="box" style="width:64px;height:64px;"></div><b>10</b><span>64</span></div>
</div></body></html>
