<!doctype html>
<html lang="ar" dir="rtl"><head>
<meta charset="utf-8">
<title>Spacing — Elevation</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body{padding:24px 28px; background: var(--bg-surface);}
  .row{display:flex; gap:22px;}
  .s{display:flex; flex-direction:column; align-items:center; gap:10px;}
  .s b{font-size:11px; font-family:var(--font-mono); color:var(--fg-3);}
  .box{width:78px; height:78px; background:var(--bg-elevated); border-radius:var(--radius-lg); border:1px solid var(--border-subtle);}
</style></head>
<body>
<div class="row">
  <div class="s"><div class="box" style="box-shadow:var(--shadow-xs)"></div><b>xs</b></div>
  <div class="s"><div class="box" style="box-shadow:var(--shadow-sm)"></div><b>sm</b></div>
  <div class="s"><div class="box" style="box-shadow:var(--shadow-md)"></div><b>md</b></div>
  <div class="s"><div class="box" style="box-shadow:var(--shadow-lg)"></div><b>lg</b></div>
  <div class="s"><div class="box" style="box-shadow:var(--shadow-xl)"></div><b>xl</b></div>
  <div class="s"><div class="box" style="box-shadow:var(--shadow-focus)"></div><b>focus</b></div>
</div></body></html>
