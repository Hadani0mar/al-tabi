<!doctype html>
<html lang="ar" dir="rtl"><head>
<meta charset="utf-8">
<title>Type — Numerics & Currency</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body{padding:18px 24px;}
  .table{width:100%; border-collapse:collapse; font-size:14px;}
  .table th,.table td{padding:8px 10px; text-align:start; border-bottom:1px solid var(--border-subtle);}
  .table th{font-size:11px; color:var(--fg-3); font-weight:600; letter-spacing:.05em; text-transform:uppercase;}
  .num{font-family:var(--font-numeric); font-variant-numeric:tabular-nums; font-weight:600; text-align:end !important;}
  .pos{color:var(--currency-pos);} .neg{color:var(--currency-neg);}
</style></head>
<body>
<table class="table">
  <thead><tr><th>الصنف</th><th>الكمية</th><th>الإجمالي (د.ل)</th><th>الفرق</th></tr></thead>
  <tbody>
    <tr><td>أموكسيسيلين 500mg</td><td class="num">1,240</td><td class="num">38,420.00</td><td class="num pos">+12.4%</td></tr>
    <tr><td>باراسيتامول 500mg</td><td class="num">  890</td><td class="num">14,560.00</td><td class="num neg">−3.2%</td></tr>
    <tr><td>أوميبرازول 20mg</td><td class="num">  402</td><td class="num"> 9,840.00</td><td class="num pos">+1.8%</td></tr>
  </tbody>
</table></body></html>
