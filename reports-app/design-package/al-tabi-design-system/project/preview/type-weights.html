<!doctype html>
<html lang="ar" dir="rtl"><head>
<meta charset="utf-8">
<title>Type — Weights</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body{padding:18px 24px;}
  .w{display:grid; grid-template-columns:80px 1fr; gap:14px; align-items:baseline; padding:6px 0; border-bottom:1px solid var(--border-subtle);}
  .w:last-child{border:none;}
  .w .tok{font-family:var(--font-mono); font-size:11px; color:var(--fg-3);}
  .w span.smp{font-size: 20px;}
</style></head>
<body>
<div class="w"><span class="tok">400 · regular</span><span class="smp" style="font-weight:400">ديون الموردين — 412,830 د.ل</span></div>
<div class="w"><span class="tok">500 · medium</span><span class="smp" style="font-weight:500">ديون الموردين — 412,830 د.ل</span></div>
<div class="w"><span class="tok">600 · semibold</span><span class="smp" style="font-weight:600">ديون الموردين — 412,830 د.ل</span></div>
<div class="w"><span class="tok">700 · bold</span><span class="smp" style="font-weight:700">ديون الموردين — 412,830 د.ل</span></div>
</body></html>
