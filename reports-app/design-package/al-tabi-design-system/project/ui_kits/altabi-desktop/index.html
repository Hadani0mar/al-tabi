<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>al-tabi · UI Kit</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <style>
    html, body {
      margin: 0; padding: 0;
      background:
        radial-gradient(circle at 30% 20%, #EFE9D8 0%, #E8E0CA 50%, #DAD0B5 100%);
      min-height: 100vh;
      font-family: var(--font-ui);
    }
    .stage {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      box-sizing: border-box;
    }
    @keyframes pulse { 0%,100%{ opacity: 0.4; } 50%{ opacity: 1; } }

    /* Scrollbar polish — RTL safe */
    *::-webkit-scrollbar { width: 10px; height: 10px; }
    *::-webkit-scrollbar-track { background: transparent; }
    *::-webkit-scrollbar-thumb {
      background: var(--border-default);
      border-radius: 99px; border: 2px solid var(--bg-canvas);
    }
    *::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }
  </style>
</head>
<body>
  <div class="stage">
    <div id="root"></div>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="icons.jsx" data-presets="react"></script>
  <script type="text/babel" src="ui.jsx" data-presets="react"></script>
  <script type="text/babel" src="AppShell.jsx" data-presets="react"></script>
  <script type="text/babel" src="LoginScreen.jsx" data-presets="react"></script>
  <script type="text/babel" src="AIChatScreen.jsx" data-presets="react"></script>
  <script type="text/babel" src="ReportsScreen.jsx" data-presets="react"></script>
  <script type="text/babel" src="SavedScreen.jsx" data-presets="react"></script>
  <script type="text/babel" src="SettingsScreen.jsx" data-presets="react"></script>
  <script type="text/babel" src="MiscScreens.jsx" data-presets="react"></script>
  <script type="text/babel" src="app.jsx" data-presets="react"></script>
</body>
</html>
